from selenium import webdriver
from selenium.webdriver.common.by import By
from selenium.webdriver.chrome.options import Options
import time

EMAIL = "твоя_почта"
PASSWORD = "твой_пароль"
URL = "https://scalacube.com/cp/login"

options = Options()
options.add_argument("--headless=new")

driver = webdriver.Chrome(options=options)

try:
    driver.get(URL)
    time.sleep(5)

    driver.find_element(By.NAME, "email").send_keys(EMAIL)
    driver.find_element(By.NAME, "password").send_keys(PASSWORD)
    driver.find_element(By.XPATH, "//button[contains(text(),'Login')]").click()

    time.sleep(8)

    driver.get("https://scalacube.com/cp/free#/node/5089365/gameserver/23387150")

    time.sleep(10)

    try:
        renew_button = driver.find_element(By.XPATH, "//button[contains(text(),'Renew')]")
        renew_button.click()
        print("Server renewed!")
    except:
        print("Renew button not found yet.")

finally:
    driver.quit()
