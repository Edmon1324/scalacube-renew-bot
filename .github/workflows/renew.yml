name: Renew ScalaCube Server

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager

      - name: Run renew script
        env:
          EMAIL: ${{ secrets.SCALACUBE_EMAIL }}
          PASSWORD: ${{ secrets.SCALACUBE_PASSWORD }}
        run: |
          python <<EOF
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager
          from selenium.webdriver.chrome.options import Options
          import time, os

          options = Options()
          options.add_argument("--headless")
          options.add_argument("--no-sandbox")
          options.add_argument("--disable-dev-shm-usage")

          driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=options)

          driver.get("https://scalacube.com/login")

          time.sleep(8)

          driver.find_element(By.ID, "email").send_keys(os.environ["EMAIL"])
          driver.find_element(By.ID, "password").send_keys(os.environ["PASSWORD"])

          driver.find_element(By.XPATH, "//button[contains(text(),'Login')]").click()

          time.sleep(12)

          driver.get("https://scalacube.com/cp/free#/node/5089365/gameserver/23387150")

          time.sleep(15)

          print("Opened server page successfully")

          driver.quit()
          EOF
